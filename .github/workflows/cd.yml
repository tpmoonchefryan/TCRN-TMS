name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - pii
      build_mode:
        description: 'Docker build mode'
        required: true
        default: 'cached'
        type: choice
        options:
          - cached
          - clean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =============================================================================
  # Change Classification
  # =============================================================================
  classify-changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      should_run_cd: ${{ steps.classify.outputs.should_run_cd }}
      should_deploy_runtime: ${{ steps.classify.outputs.should_deploy_runtime }}
      skip_reason: ${{ steps.classify.outputs.skip_reason }}
      build_no_cache: ${{ steps.classify.outputs.build_no_cache }}
      rollout_migrations_csv: ${{ steps.classify.outputs.rollout_migrations_csv }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether this push needs runtime CD
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_run_cd=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy_runtime=true" >> "$GITHUB_OUTPUT"
            echo "rollout_migrations_csv=" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event.inputs.build_mode }}" == "clean" ]]; then
              echo "build_no_cache=--no-cache" >> "$GITHUB_OUTPUT"
              echo "skip_reason=manual_dispatch_clean_build" >> "$GITHUB_OUTPUT"
            else
              echo "build_no_cache=" >> "$GITHUB_OUTPUT"
              echo "skip_reason=manual_dispatch_cached_build" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "should_run_cd=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy_runtime=true" >> "$GITHUB_OUTPUT"
            echo "build_no_cache=--no-cache" >> "$GITHUB_OUTPUT"
            echo "rollout_migrations_csv=" >> "$GITHUB_OUTPUT"
            echo "skip_reason=tag_release" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          after_sha="${GITHUB_SHA}"

          if [[ -z "$before_sha" || "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "Unable to determine a stable diff base, running full CD."
            echo "should_run_cd=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy_runtime=true" >> "$GITHUB_OUTPUT"
            echo "build_no_cache=" >> "$GITHUB_OUTPUT"
            echo "rollout_migrations_csv=" >> "$GITHUB_OUTPUT"
            echo "skip_reason=unknown_diff_base" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$before_sha" "$after_sha")

          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            echo "No changed files detected, running full CD."
            echo "should_run_cd=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy_runtime=true" >> "$GITHUB_OUTPUT"
            echo "build_no_cache=" >> "$GITHUB_OUTPUT"
            echo "rollout_migrations_csv=" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no_changed_files" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          only_docs_like=true
          only_build_test_like=true
          rollout_migrations=()
          for file in "${changed_files[@]}"; do
            if [[ "$file" =~ ^packages/database/prisma/migrations/([^/]+)/migration\.sql$ ]]; then
              rollout_migrations+=("${BASH_REMATCH[1]}")
            fi

            if [[ "$file" =~ ^README(\.zh-CN|\.ja)?\.md$ ]] || [[ "$file" =~ ^docs/ ]] || [[ "$file" =~ ^\.llm/ ]] || [[ "$file" =~ ^\.context/ ]]; then
              continue
            fi

            only_docs_like=false

            if [[ "$file" =~ ^\.github/ ]] || \
               [[ "$file" =~ ^scripts/ ]] || \
               [[ "$file" =~ ^apps/[^/]+/test/ ]] || \
               [[ "$file" =~ ^apps/[^/]+/src/(__tests__/|.+/__tests__/) ]] || \
               [[ "$file" =~ ^apps/[^/]+/src/.+\.(spec|test)\.[tj]sx?$ ]] || \
               [[ "$file" =~ ^packages/[^/]+/(src|scripts)/(__tests__/|.+/__tests__/) ]] || \
               [[ "$file" =~ ^packages/[^/]+/(src|scripts)/.+\.(spec|test)\.[tj]sx?$ ]]; then
              continue
            fi

            only_build_test_like=false
            echo "Runtime-impacting file detected: $file"
          done

          if [[ "${#rollout_migrations[@]}" -gt 0 ]]; then
            mapfile -t unique_rollout_migrations < <(printf '%s\n' "${rollout_migrations[@]}" | sort -u)
            rollout_migrations_csv=$(IFS=,; echo "${unique_rollout_migrations[*]}")
          else
            rollout_migrations_csv=""
          fi

          echo "rollout_migrations_csv=$rollout_migrations_csv" >> "$GITHUB_OUTPUT"

          if [[ "$only_docs_like" == true ]]; then
            echo "Detected docs/local-rules only change set:"
            printf ' - %s\n' "${changed_files[@]}"
            echo "should_run_cd=false" >> "$GITHUB_OUTPUT"
            echo "should_deploy_runtime=false" >> "$GITHUB_OUTPUT"
            echo "build_no_cache=" >> "$GITHUB_OUTPUT"
            echo "skip_reason=docs_only" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$only_build_test_like" == true ]]; then
            echo "Detected build/test-only change set:"
            printf ' - %s\n' "${changed_files[@]}"
            echo "should_run_cd=true" >> "$GITHUB_OUTPUT"
            echo "should_deploy_runtime=false" >> "$GITHUB_OUTPUT"
            echo "build_no_cache=" >> "$GITHUB_OUTPUT"
            echo "skip_reason=build_test_only" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run_cd=true" >> "$GITHUB_OUTPUT"
          echo "should_deploy_runtime=true" >> "$GITHUB_OUTPUT"
          echo "build_no_cache=" >> "$GITHUB_OUTPUT"
          echo "skip_reason=runtime_change" >> "$GITHUB_OUTPUT"

  # =============================================================================
  # Build and Test
  # =============================================================================
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [classify-changes]
    if: needs.classify-changes.outputs.should_run_cd == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Type Check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  skip-docs-only:
    name: Skip Docs-Only Push
    runs-on: ubuntu-latest
    needs: [classify-changes]
    if: needs.classify-changes.outputs.should_run_cd != 'true'
    steps:
      - name: Report skip reason
        run: |
          echo "Skipping build/deploy because this push only touched docs or local rule layers."
          echo "Reason: ${{ needs.classify-changes.outputs.skip_reason }}"

  skip-runtime-deploy:
    name: Skip Runtime Deploy
    runs-on: ubuntu-latest
    needs: [classify-changes, build-test]
    if: |
      needs.classify-changes.outputs.should_run_cd == 'true' &&
      needs.classify-changes.outputs.should_deploy_runtime != 'true'
    steps:
      - name: Report skip reason
        run: |
          echo "Build/test completed, but skipping runtime deploy because this change set is classified as build-test-only."
          echo "Reason: ${{ needs.classify-changes.outputs.skip_reason }}"

  # =============================================================================
  # Deploy to Production Server (Main Services)
  # =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [classify-changes, build-test]
    if: |
      needs.classify-changes.outputs.should_run_cd == 'true' &&
      needs.classify-changes.outputs.should_deploy_runtime == 'true' &&
      (github.ref == 'refs/heads/main' || 
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production')
      )
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            echo "🚀 Starting deployment..."
            BUILD_NO_CACHE="${{ needs.classify-changes.outputs.build_no_cache }}"

            # Navigate to project directory
            cd ${{ vars.PROD_PROJECT_PATH || '/root/tcrn-tms' }}

            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart services
            echo "🔨 Building and restarting services..."
            if [ -n "$BUILD_NO_CACHE" ]; then
              echo "Using clean Docker rebuild for web/api/worker."
            else
              echo "Using cached Docker rebuild for web/api/worker."
            fi
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build ${BUILD_NO_CACHE:+$BUILD_NO_CACHE} web api worker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate web api worker

            # Run database migrations (if any)
            echo "📊 Running database migrations..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api sh -c "cd /app/packages/database && npx prisma migrate deploy && npx tsx scripts/apply-migrations.ts"

            ROLLOUT_MIGRATIONS="${{ needs.classify-changes.outputs.rollout_migrations_csv }}"
            if [ -n "$ROLLOUT_MIGRATIONS" ]; then
              echo "🔎 Running schema rollout verification for migrations: $ROLLOUT_MIGRATIONS"
              VERIFY_ARGS="--infer-artifacts-from-migrations --json"
              IFS=',' read -r -a ROLLOUT_MIGRATION_ARRAY <<< "$ROLLOUT_MIGRATIONS"
              for migration in "${ROLLOUT_MIGRATION_ARRAY[@]}"; do
                if [ -n "$migration" ]; then
                  VERIFY_ARGS="$VERIFY_ARGS --migration $migration"
                fi
              done

              docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api sh -lc "cd /app/packages/database && npx tsx scripts/verify-schema-rollout.ts $VERIFY_ARGS"
            else
              echo "ℹ️ No migration.sql changes detected in this diff; skipping automated schema rollout verification."
            fi

            # Clean up old images and build cache (run in background to avoid SSH timeout)
            echo "🧹 Cleaning up old images and cache (background)..."
            nohup sh -c 'docker image prune -a -f && docker builder prune -a -f' > /tmp/docker-cleanup.log 2>&1 &

            echo "✅ Deployment completed successfully!"

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e
            echo "🔍 Verifying deployment..."
            cd ${{ vars.PROD_PROJECT_PATH || '/root/tcrn-tms' }}

            # Check container health
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

            # Wait for services to be ready
            sleep 10

            # Probe the API from inside its container because the production compose
            # topology only exposes port 4000 on the internal Docker network.
            for attempt in $(seq 1 12); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T api sh -lc "wget -qO- http://127.0.0.1:4000/api/v1/health >/dev/null"; then
                echo "✅ API health check passed"
                break
              fi

              if [ "$attempt" -eq 12 ]; then
                echo "❌ API health check failed after retries"
                exit 1
              fi

              echo "⏳ Waiting for API health... ($attempt/12)"
              sleep 5
            done

            echo "✅ Deployment verification completed!"

  # =============================================================================
  # Deploy to PII Server (Separated PII Services)
  # =============================================================================
  deploy-pii:
    name: Deploy PII Service
    runs-on: ubuntu-latest
    needs: [classify-changes, build-test]
    if: |
      needs.classify-changes.outputs.should_run_cd == 'true' &&
      needs.classify-changes.outputs.should_deploy_runtime == 'true' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_target == 'pii'
    environment:
      name: pii-production
    steps:
      - name: Deploy PII Service via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PII_SSH_HOST }}
          username: ${{ secrets.PII_SSH_USER }}
          key: ${{ secrets.PII_SSH_KEY }}
          port: ${{ secrets.PII_SSH_PORT || 22 }}
          script: |
            set -e
            echo "🔐 Starting PII service deployment..."
            BUILD_NO_CACHE="${{ needs.classify-changes.outputs.build_no_cache }}"

            cd ${{ vars.PII_PROJECT_PATH || '/root/tcrn-tms-pii' }}

            git fetch origin main
            git reset --hard origin/main

            if [ -n "$BUILD_NO_CACHE" ]; then
              echo "Using clean Docker rebuild for pii-service."
            else
              echo "Using cached Docker rebuild for pii-service."
            fi
            docker compose -f docker-compose.yml -f docker-compose.pii.prod.yml build ${BUILD_NO_CACHE:+$BUILD_NO_CACHE} pii-service
            docker compose -f docker-compose.yml -f docker-compose.pii.prod.yml up -d --force-recreate pii-service pii-postgres

            docker image prune -f

            echo "✅ PII service deployment completed!"

  # =============================================================================
  # Optional: Build and Push Docker Images to Registry
  # =============================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [classify-changes, build-test]
    if: |
      needs.classify-changes.outputs.should_run_cd == 'true' &&
      needs.classify-changes.outputs.should_deploy_runtime == 'true' &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: web
            dockerfile: infra/docker/web.Dockerfile
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: worker
            dockerfile: infra/docker/worker.Dockerfile
          - name: pii-service
            dockerfile: infra/docker/pii-service.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
