apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcrn-worker
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-worker
    app.kubernetes.io/part-of: tcrn-tms
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: tcrn-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tcrn-worker
        app.kubernetes.io/part-of: tcrn-tms
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      # registry-secret-placeholder
      containers:
        - name: worker
          image: ghcr.io/tpmoonchefryan/tcrn-tms/worker:replace-me
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          env:
            - name: NODE_ENV
              value: production
            - name: ENABLE_SCHEDULED_JOBS
              value: 'true'
            - name: WORKER_READY_FILE
              value: /tmp/tcrn-worker-ready
          startupProbe:
            exec:
              command:
                - node
                - -e
                - process.exit(require('node:fs').existsSync(process.env.WORKER_READY_FILE || '/tmp/tcrn-worker-ready') ? 0: 1)
            failureThreshold: 24
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - process.exit(require('node:fs').existsSync(process.env.WORKER_READY_FILE || '/tmp/tcrn-worker-ready') ? 0: 1)
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - process.exit(require('node:fs').existsSync(process.env.WORKER_READY_FILE || '/tmp/tcrn-worker-ready') ? 0: 1)
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: tcrn-runtime-env
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
