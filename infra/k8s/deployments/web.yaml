apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcrn-web
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-web
    app.kubernetes.io/part-of: tcrn-tms
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: tcrn-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tcrn-web
        app.kubernetes.io/part-of: tcrn-tms
    spec:
      terminationGracePeriodSeconds: 30
      # registry-secret-placeholder
      containers:
        - name: web
          image: ghcr.io/tpmoonchefryan/tcrn-tms/web:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: '1'
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_APP_ENV
              value: production
            - name: PORT
              value: '3000'
            - name: HOSTNAME
              value: '0.0.0.0'
            - name: API_URL
              value: http://tcrn-api.tcrn.svc.cluster.local:4000
          envFrom:
            - secretRef:
                name: tcrn-runtime-env
---
apiVersion: v1
kind: Service
metadata:
  name: tcrn-web
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-web
    app.kubernetes.io/part-of: tcrn-tms
spec:
  selector:
    app.kubernetes.io/name: tcrn-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
