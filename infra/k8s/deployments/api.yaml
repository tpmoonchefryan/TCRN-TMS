apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcrn-api
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-api
    app.kubernetes.io/part-of: tcrn-tms
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: tcrn-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tcrn-api
        app.kubernetes.io/part-of: tcrn-tms
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      # registry-secret-placeholder
      containers:
        - name: api
          image: ghcr.io/tpmoonchefryan/tcrn-tms/api:replace-me
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 4000
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: '1'
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: '4000'
          envFrom:
            - secretRef:
                name: tcrn-runtime-env
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tcrn-api
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-api
    app.kubernetes.io/part-of: tcrn-tms
spec:
  selector:
    app.kubernetes.io/name: tcrn-api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
