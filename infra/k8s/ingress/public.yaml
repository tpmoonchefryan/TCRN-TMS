#
# First-cut public ingress.
# The repo-owned browser runtime has been removed.
# This ingress now publishes the API only.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tcrn-public
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-public
    app.kubernetes.io/part-of: tcrn-tms
spec:
  ingressClassName: replace-me-ingress-class
  tls:
    - hosts:
        - replace-me.example.com
      secretName: replace-me-tls-secret
  rules:
    - host: replace-me.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tcrn-api
                port:
                  number: 4000
