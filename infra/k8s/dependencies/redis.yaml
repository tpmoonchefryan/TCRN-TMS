apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tcrn-redis-data
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-redis
    app.kubernetes.io/part-of: tcrn-tms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcrn-redis
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-redis
    app.kubernetes.io/part-of: tcrn-tms
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tcrn-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tcrn-redis
        app.kubernetes.io/part-of: tcrn-tms
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - exec redis-server --requirepass "$REDIS_PASSWORD" --appendonly yes
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tcrn-runtime-env
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tcrn-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: tcrn-redis
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-redis
    app.kubernetes.io/part-of: tcrn-tms
spec:
  selector:
    app.kubernetes.io/name: tcrn-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
