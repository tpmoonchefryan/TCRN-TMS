apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tcrn-nats-data
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-nats
    app.kubernetes.io/part-of: tcrn-tms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcrn-nats
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-nats
    app.kubernetes.io/part-of: tcrn-tms
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tcrn-nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tcrn-nats
        app.kubernetes.io/part-of: tcrn-tms
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: nats
          image: nats:2-alpine
          imagePullPolicy: IfNotPresent
          args:
            - --jetstream
            - --store_dir=/data
            - -m
            - '8222'
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tcrn-nats-data
---
apiVersion: v1
kind: Service
metadata:
  name: tcrn-nats
  namespace: tcrn
  labels:
    app.kubernetes.io/name: tcrn-nats
    app.kubernetes.io/part-of: tcrn-tms
spec:
  selector:
    app.kubernetes.io/name: tcrn-nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
  type: ClusterIP
