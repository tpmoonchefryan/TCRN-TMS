packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@swc/core': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - bullmq@5.77.2
  - nodemailer@8.0.8

overrides:
  diff@>=4.0.0 <4.0.4: 4.0.4
  dompurify@<3.4.5: 3.4.5
  minimatch@<3.1.5: 3.1.5
  minimatch@>=9.0.0 <9.0.7: 9.0.7
  picomatch@<2.3.2: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  postcss@<8.5.15: 8.5.15
  qs@<6.15.2: 6.15.2
  uuid@<11.1.1: 11.1.1
  effect@<3.20.0: 3.21.2
  defu@<6.1.5: 6.1.7
  lodash-es@<4.18.0: 4.18.1
